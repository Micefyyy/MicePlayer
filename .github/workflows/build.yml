name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Set Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app (debug, no signing)
        run: |
          xcodebuild build \
            -project AnimePlayer.xcodeproj \
            -scheme AnimePlayer \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package .app as .ipa
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Debug-iphoneos/AnimePlayer.app Payload/
          zip -r AnimePlayer.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: AnimePlayer.ipa
          path: AnimePlayer.ipa
